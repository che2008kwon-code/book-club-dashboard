<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 독서모임 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===== 기본 초기화 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #f5f0e8 0%, #e8ddd0 100%);
      min-height: 100vh;
      color: #3d2b1f;
    }

    /* ===== 헤더 ===== */
    header {
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      color: white;
      text-align: center;
      padding: 30px 20px 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      position: relative;
    }

    /* ① 홈버튼: 제목을 클릭 가능하게 */
    .header-home-btn {
      display: inline-block;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.2s;
    }
    .header-home-btn:hover { opacity: 0.85; }
    .header-home-btn h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .home-badge {
      display: inline-block;
      font-size: 0.68rem;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.35);
      color: rgba(255,255,255,0.9);
      padding: 2px 9px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
      letter-spacing: 0;
    }
    header p { font-size: 0.95rem; opacity: 0.85; }

    .admin-link {
      position: absolute;
      top: 14px; right: 16px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 4px 10px;
      border-radius: 20px;
      transition: opacity 0.2s;
    }
    .admin-link:hover { color: rgba(255,255,255,0.9); }

    /* ===== 탭 네비게이션 ===== */
    .tab-nav {
      background: white;
      border-bottom: 2px solid #e8ddd0;
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 0 16px;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(92,61,46,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tab-btn {
      padding: 14px 22px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: #a0856e;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-bottom: -2px;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #5c3d2e; }
    .tab-btn.active {
      color: #5c3d2e;
      border-bottom-color: #8b6340;
    }

    /* ===== 탭 콘텐츠 ===== */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ===== 로딩 오버레이 ===== */
    #loading-overlay {
      position: fixed; inset: 0;
      background: rgba(245,240,232,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999;
      gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e0cfc0;
      border-top-color: #8b6340;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p { color: #8b6340; font-size: 0.95rem; }

    /* ===== 컨테이너 ===== */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 16px;
      display: grid;
      gap: 24px;
    }

    /* ===== 카드 공통 ===== */
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(92,61,46,0.1);
    }
    .card h2 {
      font-size: 1.2rem;
      color: #5c3d2e;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8ddd0;
      display: flex; align-items: center; gap: 8px;
    }

    /* ===== 모임 일정 ===== */
    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }
    .schedule-item {
      background: linear-gradient(135deg, #fdf6ee, #f5ece0);
      border: 1px solid #e0cfc0;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .schedule-item .label {
      font-size: 0.75rem; color: #8b6340;
      font-weight: 600; letter-spacing: 1px; margin-bottom: 6px;
    }
    .schedule-item .value { font-size: 1rem; font-weight: 700; color: #3d2b1f; }

    /* ===== 선정도서 ===== */
    .book-section { display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap; }
    .book-cover-wrap { flex-shrink: 0; }
    .book-cover {
      width: 140px; height: 200px;
      border-radius: 6px; object-fit: cover;
      box-shadow: 6px 6px 20px rgba(0,0,0,0.25), -2px 0 8px rgba(0,0,0,0.1);
      display: block;
    }
    .book-cover-placeholder {
      width: 140px; height: 200px;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 6px 6px 20px rgba(0,0,0,0.25);
      color: white; font-size: 2.5rem;
    }
    .book-info { flex: 1; min-width: 200px; }
    .book-title { font-size: 1.5rem; font-weight: 700; color: #3d2b1f; margin-bottom: 6px; line-height: 1.3; }
    .book-author { font-size: 0.95rem; color: #8b6340; margin-bottom: 4px; }
    .book-publisher { font-size: 0.85rem; color: #a0856e; margin-bottom: 14px; }
    .book-desc {
      font-size: 0.9rem; line-height: 1.7; color: #5a4035;
      background: #fdf6ee;
      border-left: 3px solid #8b6340;
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
    }

    /* ===== 정보 없을 때 배너 ===== */
    .no-info-banner {
      background: #fff8f0;
      border: 2px dashed #c4a882;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      color: #8b6340;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .no-info-banner strong { display: block; font-size: 1.1rem; margin-bottom: 8px; }

    /* ===== 댓글 작성 폼 ===== */
    .form-section {
      background: linear-gradient(135deg, #fffbf7, #fdf6ee);
      border: 1px solid #e8ddd0;
    }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 0.85rem;
      font-weight: 600; color: #5c3d2e; margin-bottom: 6px;
    }
    .form-row input,
    .form-row textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid #d4c4b0; border-radius: 8px;
      font-size: 0.95rem; font-family: inherit; color: #3d2b1f;
      background: white; resize: vertical; transition: border-color 0.2s;
    }
    .form-row input:focus,
    .form-row textarea:focus {
      outline: none; border-color: #8b6340;
      box-shadow: 0 0 0 3px rgba(139,99,64,0.1);
    }
    .submit-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      color: white; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s; font-family: inherit;
    }
    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #msg { text-align: center; margin-top: 10px; font-size: 0.9rem; min-height: 20px; color: #5c3d2e; }

    /* ===== 이번 달 댓글 목록 ===== */
    .comments-list { display: flex; flex-direction: column; gap: 14px; }
    .comment-card {
      background: #fdf6ee; border: 1px solid #e8ddd0;
      border-radius: 12px; padding: 16px 18px;
    }
    .comment-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .comment-name { font-weight: 700; color: #5c3d2e; font-size: 0.95rem; }
    .comment-date { font-size: 0.75rem; color: #b0927a; }
    .comment-review {
      font-size: 0.92rem; color: #3d2b1f; line-height: 1.6;
      margin-bottom: 8px; padding: 8px 12px;
      background: white; border-radius: 8px; border-left: 3px solid #c4a882;
    }
    .comment-question { font-size: 0.88rem; color: #6b4c35; line-height: 1.6; }
    .comment-question::before { content: "💬 질문: "; font-weight: 600; }
    .empty-msg {
      text-align: center; color: #b0927a;
      font-size: 0.9rem; padding: 30px 0;
    }

    /* ===== 업데이트 배지 ===== */
    .updated-badge {
      font-size: 0.72rem; color: #b0927a;
      margin-left: auto; font-weight: normal;
    }

    /* ===== 📚 지난 독서목록 ===== */
    .history-list { display: flex; flex-direction: column; gap: 16px; }

    /* ② 클릭 가능한 history-item */
    .history-item {
      display: flex; gap: 20px;
      padding: 20px;
      background: #fdf6ee;
      border: 1px solid #e8ddd0;
      border-radius: 14px;
      align-items: flex-start;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
      position: relative;
    }
    .history-item:hover {
      box-shadow: 0 6px 20px rgba(92,61,46,0.15);
      transform: translateY(-2px);
      border-color: #c4a882;
    }
    .history-item::after {
      content: "자세히 보기 ›";
      position: absolute;
      bottom: 12px; right: 16px;
      font-size: 0.72rem;
      color: #8b6340;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .history-item:hover::after { opacity: 1; }

    .history-cover {
      width: 80px; height: 114px;
      border-radius: 5px; object-fit: cover;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    .history-cover-placeholder {
      width: 80px; height: 114px;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      border-radius: 5px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.8rem;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
    }
    .history-info { flex: 1; min-width: 0; }
    .history-title {
      font-size: 1.1rem; font-weight: 700; color: #3d2b1f;
      margin-bottom: 4px; line-height: 1.3;
    }
    .history-author { font-size: 0.88rem; color: #8b6340; margin-bottom: 2px; }
    .history-publisher { font-size: 0.82rem; color: #a0856e; margin-bottom: 8px; }
    .history-date {
      display: inline-block;
      background: #e8ddd0; color: #5c3d2e;
      font-size: 0.75rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
    }
    .history-desc {
      font-size: 0.85rem; color: #6b4c35; line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ===== ② 책 상세 모달 ===== */
    .book-modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(61,43,31,0.55);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(2px);
    }
    .book-modal-overlay.open {
      display: flex;
    }
    .book-modal {
      background: #faf7f2;
      border-radius: 20px;
      width: 100%;
      max-width: 700px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .book-modal-header {
      display: flex; gap: 20px; align-items: flex-start;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      padding: 24px;
      border-radius: 20px 20px 0 0;
      color: white;
      position: relative;
    }
    .modal-close-btn {
      position: absolute; top: 14px; right: 16px;
      background: rgba(255,255,255,0.2);
      border: none; color: white;
      font-size: 1.1rem; cursor: pointer;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close-btn:hover { background: rgba(255,255,255,0.35); }
    .modal-cover {
      width: 90px; height: 128px;
      border-radius: 6px; object-fit: cover;
      box-shadow: 4px 4px 14px rgba(0,0,0,0.35);
      flex-shrink: 0;
    }
    .modal-cover-placeholder {
      width: 90px; height: 128px;
      background: rgba(255,255,255,0.15);
      border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
    }
    .modal-book-meta { flex: 1; padding-right: 32px; }
    .modal-book-title {
      font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; line-height: 1.3;
    }
    .modal-book-author { font-size: 0.9rem; opacity: 0.85; margin-bottom: 3px; }
    .modal-book-publisher { font-size: 0.82rem; opacity: 0.7; margin-bottom: 10px; }
    .modal-book-date {
      display: inline-block;
      font-size: 0.72rem; background: rgba(255,255,255,0.2);
      padding: 3px 10px; border-radius: 20px;
    }
    .book-modal-body { padding: 24px; }
    .modal-desc {
      font-size: 0.9rem; line-height: 1.8; color: #5a4035;
      background: white; border-left: 3px solid #8b6340;
      padding: 14px 16px; border-radius: 0 10px 10px 0;
      margin-bottom: 24px;
    }
    .modal-reviews-title {
      font-size: 1rem; font-weight: 700; color: #5c3d2e;
      margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 2px solid #e8ddd0;
      display: flex; align-items: center; gap: 6px;
    }

    /* ===== 💬 지난 한줄평 (책별 묶음) ===== */
    .review-book-block {
      background: white;
      border-radius: 14px;
      border: 1px solid #e8ddd0;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 2px 10px rgba(92,61,46,0.07);
    }

    /* ③ 진행 중 도서 강조 배지 */
    .current-book-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.7rem; background: #e8543a; color: white;
      padding: 3px 10px; border-radius: 20px;
      font-weight: 700; animation: pulse 1.8s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:0.7; }
    }

    .review-book-header {
      display: flex; gap: 14px; align-items: center;
      background: linear-gradient(135deg, #fdf6ee, #f5ece0);
      padding: 16px 20px;
      border-bottom: 1px solid #e8ddd0;
      flex-wrap: wrap;
    }
    .review-book-thumb {
      width: 48px; height: 68px;
      border-radius: 4px; object-fit: cover;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2); flex-shrink: 0;
    }
    .review-book-thumb-placeholder {
      width: 48px; height: 68px;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.2rem;
    }
    .review-book-meta { flex: 1; min-width: 120px; }
    .review-book-title {
      font-size: 1rem; font-weight: 700; color: #3d2b1f; margin-bottom: 3px;
    }
    .review-book-author { font-size: 0.82rem; color: #8b6340; }
    .review-book-date {
      font-size: 0.72rem; background: #5c3d2e; color: white;
      padding: 3px 10px; border-radius: 20px; white-space: nowrap;
      align-self: flex-start;
    }
    .review-comments-wrap { padding: 16px 20px; }
    .review-comment-item {
      padding: 12px 14px;
      background: #fdf6ee;
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 3px solid #c4a882;
    }
    .review-comment-item:last-child { margin-bottom: 0; }
    .review-comment-name {
      font-size: 0.85rem; font-weight: 700; color: #5c3d2e; margin-bottom: 5px;
    }
    .review-comment-text {
      font-size: 0.88rem; color: #3d2b1f; line-height: 1.6; margin-bottom: 4px;
    }
    .review-comment-question {
      font-size: 0.83rem; color: #6b4c35; line-height: 1.5;
    }
    .review-comment-question::before { content: "💬 질문: "; font-weight: 600; }
    .review-comment-date { font-size: 0.7rem; color: #b0927a; margin-top: 4px; }
    .review-empty {
      text-align: center; color: #b0927a;
      font-size: 0.85rem; padding: 16px 0;
    }
    .review-count-badge {
      font-size: 0.72rem;
      background: rgba(92,61,46,0.12);
      color: #5c3d2e; padding: 2px 8px;
      border-radius: 99px; margin-left: 6px; font-weight: 600;
    }

    /* ===== 로딩 인디케이터 ===== */
    .tab-loading {
      text-align: center; padding: 40px;
      color: #a0856e; font-size: 0.9rem;
    }
    .tab-spinner {
      width: 28px; height: 28px;
      border: 3px solid #e0cfc0;
      border-top-color: #8b6340;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    /* ===== 반응형 ===== */
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .book-section { flex-direction: column; align-items: center; }
      .book-info { text-align: center; }
      .book-desc { text-align: left; }
      .tab-btn { padding: 12px 14px; font-size: 0.82rem; }
      .history-item { gap: 12px; }
      .book-modal-header { flex-direction: column; }
      .modal-book-meta { padding-right: 0; }
    }
  </style>
</head>
<body>

  <!-- 로딩 오버레이 -->
  <div id="loading-overlay">
    
    <p>모임 정보를 불러오는 중...</p>
  </div>

  <!-- ② 책 상세 모달 -->
  <div class="book-modal-overlay" id="bookModal" onclick="closeModal(event)">
    <div class="book-modal" id="bookModalInner">
      <div class="book-modal-header" id="modalHeader">
        <button class="modal-close-btn" onclick="closeModalDirect()">✕</button>
      </div>
      
    </div>
  </div>

  <!-- 헤더 -->
  <header>
    <!-- ① 제목 클릭 → 홈(탭1)으로 이동 -->
    <a class="header-home-btn" onclick="goHome()" href="javascript:void(0)">
      <h1>📚 책,삶,이야기 <span class="home-badge">🏠 홈</span></h1>
    </a>
    <p>책을 통해 삶을 이야기하다</p>
    <a href="admin.html" class="admin-link">⚙️ 관리자</a>
  </header>

  <!-- 탭 네비게이션 -->
  <nav class="tab-nav">
    <button class="tab-btn active" id="btn-current"
      onclick="switchTab('current', this)">📌 이번 달 모임</button>
    <button class="tab-btn" id="btn-history"
      onclick="switchTab('history', this)">📚 지난 독서목록</button>
    <button class="tab-btn" id="btn-reviews"
      onclick="switchTab('reviews', this)">💬 지난 한줄평/질문</button>
  </nav>

  <!-- ============================================================ -->
  <!-- 📌 TAB 1 : 이번 달 모임                                       -->
  <!-- ============================================================ -->
  <div id="tab-current" class="tab-content active">
    <div class="container">

      <div class="card">
        <h2>
          📅 이번 달 모임 일정
          <span class="updated-badge" id="updatedBadge"></span>
        </h2>
        
      </div>

      <div class="card">
        <h2>📖 이번 달 선정도서</h2>
        
      </div>

      <div class="card form-section">
        <h2>✏️ 나의 한줄평 &amp; 질문 남기기</h2>
        <form id="commentForm">
          <div class="form-row">
            <label for="name">이름 (닉네임)</label>
            <input type="text" id="name"
              placeholder="예: 책벌레독자" maxlength="20" required/>
          </div>
          <div class="form-row">
            <label for="review">📝 한줄평</label>
            <textarea id="review" rows="2"
              placeholder="책을 읽은 소감을 한 줄로 남겨주세요"
              maxlength="200" required></textarea>
          </div>
          <div class="form-row">

  <!-- ============================================================ -->

  <!-- ============================================================ -->

  <div id="tab-reviews" class="tab-content">

          📖 현재 진행 중인 도서와 지난 모임 도서의 한줄평을 모두 볼 수 있습니다.

  <script>
    // ============================================================
    // ⚙️ Supabase 연결
    // ============================================================
    const SUPABASE_URL = 'https://pxbgwwavxggbtywqxogj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4Ymd3d2F2eGdnYnR5d3F4b2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjk5OTEsImV4cCI6MjA5NzYwNTk5MX0.XM0039icXsyrAQ_VLl7TvB6J_MzUzP9jQotifG5C5OM';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ③ 이번 달 settings 데이터 전역 저장 (탭3에서 사용)
    let currentSettings = null;

    // ============================================================
    // ① 홈버튼: 헤더 클릭 시 탭1으로 이동
    // ============================================================
    function goHome() {
      const btn = document.getElementById('btn-current');
      switchTab('current', btn);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ============================================================
    // 🗂️ 탭 전환
    // ============================================================
    function switchTab(tabName, el) {
      document.querySelectorAll('.tab-btn')
        .forEach(b => b.classList.remove('active'));
      el.classList.add('active');

      document.querySelectorAll('.tab-content')
        .forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');

      // 탭 전환 시마다 최신 데이터 로드
      if (tabName === 'history') loadBookHistory();
      if (tabName === 'reviews') loadReviewsByBook();
    }

    // ============================================================
    // 📋 이번 달 설정 불러오기
    // ============================================================
    async function loadSettings() {
      const { data, error } = await db
        .from('settings').select('*').eq('id', 1).single();

      document.getElementById('loading-overlay').style.display = 'none';

      if (error || !data) {
        document.getElementById('scheduleArea').innerHTML = noInfoBanner('일정');
        document.getElementById('bookArea').innerHTML    = noInfoBanner('도서');
        return;
      }

      // ③ 전역 저장 (탭3 현재 도서 표시용)
      currentSettings = data;

      const scheduleHtml = (data.schedule_date||data.schedule_time||data.schedule_place||data.schedule_members)
        ? `<div class="schedule-grid">
            <div class="schedule-item">
              <div class="label">📆 모임 날짜</div>
              <div class="value">${esc(data.schedule_date)||'미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">🕑 시간</div>
              <div class="value">${esc(data.schedule_time)||'미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">📍 장소</div>
              <div class="value">${esc(data.schedule_place)||'미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">👥 참석인원</div>
              <div class="value">${esc(data.schedule_members)||'미정'}</div>
            </div>
           </div>`
        : noInfoBanner('일정');

      document.getElementById('scheduleArea').innerHTML = scheduleHtml;

      if (data.updated_at) {
        const d = new Date(data.updated_at);
        document.getElementById('updatedBadge').textContent =
          `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} 업데이트`;
      }

      const bookHtml = data.book_title
        ? `<div class="book-section">
            <div class="book-cover-wrap">
              ${data.book_cover_url
                ? ``
                : ''}
              <div id="coverFallback" class="book-cover-placeholder"
                style="display:${data.book_cover_url?'none':'flex'}">📚</div>
            </div>
            <div class="book-info">
              <div class="book-title">${esc(data.book_title)}</div>
              <div class="book-author">✍️ ${esc(data.book_author)||'저자 미등록'}</div>
              <div class="book-publisher">🏢 ${esc(data.book_publisher)||'출판사 미등록'}</div>
              <div class="book-desc">${esc(data.book_desc)||'도서 설명이 없습니다.'}</div>
            </div>
           </div>`
        : noInfoBanner('도서');

      document.getElementById('bookArea').innerHTML = bookHtml;
    }

    // ============================================================
    // 💬 이번 달 댓글 불러오기
    // ============================================================
    async function loadComments() {
      const list = document.getElementById('commentsList');
      const { data, error } = await db
        .from('comments').select('*')
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = '<div class="empty-msg">댓글을 불러오지 못했습니다 😥</div>';
        return;
      }
      if (!data || data.length === 0) {
        list.innerHTML = '<div class="empty-msg">아직 등록된 한줄평이 없습니다 🌱</div>';
        return;
      }
      list.innerHTML = data.map(item => {
        const d    = new Date(item.created_at);
        const date = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        return `
          <div class="comment-card">
            <div class="comment-header">
              <span class="comment-name">🙋 ${esc(item.name)}</span>
              <span class="comment-date">${date}</span>
            </div>
            <div class="comment-review">${esc(item.review)}</div>
            ${item.question
              ? `<div class="comment-question">${esc(item.question)}</div>` : ''}
          </div>`;
      }).join('');
    }

    // ============================================================
    // 📝 댓글 제출
    // ============================================================
    document.getElementById('commentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const review   = document.getElementById('review').value.trim();
      const question = document.getElementById('question').value.trim();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');

      if (!name || !review) {
        msg.style.color = '#c0392b';
        msg.textContent = '이름과 한줄평은 필수 입력입니다!';
        return;
      }
      btn.disabled = true; btn.textContent = '제출 중...';

      const { error } = await db.from('comments').insert([{ name, review, question }]);

      if (error) {
        msg.style.color = '#c0392b';
        msg.textContent = '제출 중 오류가 발생했습니다 😥';
      } else {
        msg.style.color = '#27ae60';
        msg.textContent = '✅ 한줄평이 등록되었습니다! 감사합니다 😊';
        document.getElementById('commentForm').reset();
        await loadComments();

        // ③ 탭3가 열려있으면 함께 갱신
        if (document.getElementById('tab-reviews').classList.contains('active')) {
          loadReviewsByBook();
        }
        setTimeout(() => { msg.textContent = ''; }, 3000);
      }
      btn.disabled = false; btn.textContent = '💌 제출하기';
    });

    // ============================================================
    // 📚 지난 독서목록 불러오기
    // ============================================================
    async function loadBookHistory() {
      const el = document.getElementById('bookHistoryList');
      el.innerHTML = `<div class="tab-loading">불러오는 중...</div>`;

      const { data, error } = await db
        .from('book_history').select('*')
        .order('created_at', { ascending: false });

      if (error || !data || data.length === 0) {
        el.innerHTML = `<div class="no-info-banner">
          <strong>📭 아직 등록된 독서 기록이 없습니다</strong>
          관리자 페이지에서 지난 도서 기록을 추가해주세요.
          <br/><a href="admin.html" style="color:#8b6340;font-weight:600;">
          → 관리자 페이지 이동</a></div>`;
        return;
      }

      document.getElementById('historyCountBadge').textContent = `총 ${data.length}권`;

      // ② 클릭 시 모달 열기 (onclick에 book 데이터 전달)
      el.innerHTML = `<div class="history-list">` +
        data.map((b, i) => `
          <div class="history-item" onclick="openBookModal(${i})"
               data-idx="${i}">
            ${b.book_cover_url
              ? ``
              : `<div class="history-cover-placeholder">📚</div>`}
            <div class="history-info">
              <div class="history-title">${esc(b.book_title)}</div>
              <div class="history-author">✍️ ${esc(b.book_author)||'저자 미등록'}</div>
              <div class="history-publisher">
                🏢 ${esc(b.book_publisher)||'출판사 미등록'}
              </div>
              ${b.meeting_date
                ? `<span class="history-date">📅 ${esc(b.meeting_date)}</span>`
                : ''}
              ${b.book_desc
                ? `<div class="history-desc">${esc(b.book_desc)}</div>`
                : ''}
            </div>
          </div>`).join('') +
        `</div>`;

      // 전역에 책 목록 저장 (모달에서 사용)
      window._bookHistoryData = data;
    }
        // ============================================================
    // ② 책 상세 모달 열기
    // ============================================================
    async function openBookModal(idx) {
      const book = window._bookHistoryData[idx];
      if (!book) return;

      // 모달 헤더 렌더링
      document.getElementById('modalHeader').innerHTML = `
        <button class="modal-close-btn" onclick="closeModalDirect()">✕</button>
        ${book.book_cover_url
          ? `<img class="modal-cover"
               src="${esc(book.book_cover_url)}"
               alt="${esc(book.book_title)}"
               onerror="this.style.display='none'">`
          : `<div class="modal-cover-placeholder">📚</div>`}
        <div class="modal-book-meta">
          <div class="modal-book-title">${esc(book.book_title)}</div>
          <div class="modal-book-author">✍️ ${esc(book.book_author)||'저자 미등록'}</div>
          <div class="modal-book-publisher">
            🏢 ${esc(book.book_publisher)||'출판사 미등록'}
          </div>
          ${book.meeting_date
            ? `<span class="modal-book-date">📅 ${esc(book.meeting_date)}</span>`
            : ''}
        </div>`;

      // 모달 바디 — 설명 먼저 표시, 댓글은 로딩 중 표시
      document.getElementById('modalBody').innerHTML = `
        ${book.book_desc
          ? `<div class="modal-desc">${esc(book.book_desc)}</div>`
          : ''}
        <div class="modal-reviews-title">
          💬 이 책의 한줄평 &amp; 질문
        </div>
        <div id="modalCommentsList">
          <div class="tab-loading">
            <div class="tab-spinner"></div>한줄평 불러오는 중...
          </div>
        </div>`;

      // 모달 열기
      document.getElementById('bookModal').classList.add('open');
      document.body.style.overflow = 'hidden'; // 배경 스크롤 방지

      // 해당 책의 댓글 로드
      await loadModalComments(book);
    }

    // ============================================================
    // ② 모달 안에서 해당 책의 댓글 불러오기
    // meeting_date 기준으로 연도-월 매칭
    // ============================================================
    async function loadModalComments(book) {
      const el = document.getElementById('modalCommentsList');
      if (!el) return;

      const ym = parseMeetingDate(book.meeting_date);

      // 댓글 전체 가져오기
      const { data: allComments, error } = await db
        .from('comments').select('*')
        .order('created_at', { ascending: true });

      if (error) {
        el.innerHTML = '<div class="review-empty">댓글을 불러오지 못했습니다 😥</div>';
        return;
      }

      // 해당 월 댓글 필터링
      const matched = (ym && allComments)
        ? allComments.filter(c => c.created_at && c.created_at.startsWith(ym))
        : [];

      if (matched.length === 0) {
        el.innerHTML = '<div class="review-empty">이 책에 대한 한줄평이 아직 없습니다 🌱</div>';
        return;
      }

      el.innerHTML =
        `<div style="font-size:0.78rem;color:#a0856e;margin-bottom:10px;">
           총 ${matched.length}개의 한줄평
           <span class="review-count-badge">${matched.length}</span>
         </div>` +
        matched.map(r => {
          const d = new Date(r.created_at);
          const dateStr = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
          return `
            <div class="review-comment-item">
              <div class="review-comment-name">🙋 ${esc(r.name)}</div>
              <div class="review-comment-text">${esc(r.review)}</div>
              ${r.question
                ? `<div class="review-comment-question">${esc(r.question)}</div>`
                : ''}
              <div class="review-comment-date">${dateStr}</div>
            </div>`;
        }).join('');
    }

    // ============================================================
    // ② 모달 닫기
    // ============================================================
    function closeModal(event) {
      // 오버레이(배경) 클릭 시에만 닫기
      if (event.target === document.getElementById('bookModal')) {
        closeModalDirect();
      }
    }
    function closeModalDirect() {
      document.getElementById('bookModal').classList.remove('open');
      document.body.style.overflow = ''; // 스크롤 복원
    }
    // ESC 키로도 닫기
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModalDirect();
    });

    // ============================================================
    // ③ 지난 한줄평 + 이번 달 진행 중 도서 함께 표시
    // ============================================================
    async function loadReviewsByBook() {
      const container = document.getElementById('reviewsByBook');
      container.innerHTML = `<div class="tab-loading">
        <div class="tab-spinner"></div>불러오는 중...</div>`;

      // 1) 도서 히스토리 가져오기
      const { data: books, error: bErr } = await db
        .from('book_history').select('*')
        .order('created_at', { ascending: false });

      // 2) 전체 댓글 가져오기
      const { data: allComments } = await db
        .from('comments').select('*')
        .order('created_at', { ascending: true });

      const comments = allComments || [];

      // ③ 이번 달 진행 중 도서 블록 생성
      let currentBookBlock = '';
      if (currentSettings && currentSettings.book_title) {
        const s    = currentSettings;
        const now  = new Date();
        const ym   = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;

        // 이번 달 작성된 댓글
        const currentMatched = comments.filter(c =>
          c.created_at && c.created_at.startsWith(ym)
        );

        currentBookBlock = `
          <div class="review-book-block"
               style="border: 2px solid #8b6340;">
            <div class="review-book-header"
                 style="background: linear-gradient(135deg, #5c3d2e, #8b6340);">
              ${s.book_cover_url
                ? `<img class="review-book-thumb"
                     src="${esc(s.book_cover_url)}"
                     alt="${esc(s.book_title)}"
                     onerror="this.style.display='none'">`
                : `<div class="review-book-thumb-placeholder">📚</div>`}
              <div class="review-book-meta">
                <div class="review-book-title"
                     style="color:white;">${esc(s.book_title)}</div>
                <div class="review-book-author"
                     style="color:rgba(255,255,255,0.75);">
                  ${esc(s.book_author)||''}
                  ${s.book_publisher ? ` · ${esc(s.book_publisher)}` : ''}
                </div>
              </div>
              <span class="current-book-badge">🔴 진행 중</span>
            </div>
            <div class="review-comments-wrap">
              ${currentMatched.length === 0
                ? `<div class="review-empty">
                     아직 이번 달 한줄평이 없습니다 🌱
                     <br/>
                     <a onclick="goHome()" href="javascript:void(0)"
                        style="color:#8b6340;font-weight:600;font-size:0.82rem;">
                       → 한줄평 남기러 가기
                     </a>
                   </div>`
                : `<div style="font-size:0.78rem;color:#a0856e;margin-bottom:10px;">
                     이번 달 한줄평 ${currentMatched.length}개
                     <span class="review-count-badge">${currentMatched.length}</span>
                   </div>` +
                  currentMatched.map(r => {
                    const d = new Date(r.created_at);
                    const dateStr = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
                    return `
                      <div class="review-comment-item"
                           style="border-left-color:#8b6340;">
                        <div class="review-comment-name">
                          🙋 ${esc(r.name)}
                        </div>
                        <div class="review-comment-text">${esc(r.review)}</div>
                        ${r.question
                          ? `<div class="review-comment-question">
                               ${esc(r.question)}
                             </div>`
                          : ''}
                        <div class="review-comment-date">${dateStr}</div>
                      </div>`;
                  }).join('')
              }
            </div>
          </div>`;
      }

      // 3) 지난 도서 블록 생성
      let historyBlocks = '';
      if (!bErr && books && books.length > 0) {
        historyBlocks = books.map(book => {
          const ym = parseMeetingDate(book.meeting_date);
          const matched = ym
            ? comments.filter(c => c.created_at && c.created_at.startsWith(ym))
            : [];

          return `
            <div class="review-book-block">
              <div class="review-book-header">
                ${book.book_cover_url
                  ? `<img class="review-book-thumb"
                       src="${esc(book.book_cover_url)}"
                       alt="${esc(book.book_title)}"
                       onerror="this.style.display='none'">`
                  : `<div class="review-book-thumb-placeholder">📚</div>`}
                <div class="review-book-meta">
                  <div class="review-book-title">${esc(book.book_title)}</div>
                  <div class="review-book-author">
                    ${esc(book.book_author)||''}
                    ${book.book_publisher ? ` · ${esc(book.book_publisher)}` : ''}
                  </div>
                </div>
                ${book.meeting_date
                  ? `<div class="review-book-date">
                       📅 ${esc(book.meeting_date)}
                     </div>`
                  : ''}
              </div>
              <div class="review-comments-wrap">
                ${matched.length === 0
                  ? `<div class="review-empty">
                       이 책에 대한 한줄평이 아직 없습니다 🌱
                     </div>`
                  : `<div style="font-size:0.78rem;color:#a0856e;margin-bottom:10px;">
                       총 ${matched.length}개의 한줄평
                       <span class="review-count-badge">${matched.length}</span>
                     </div>` +
                    matched.map(r => {
                      const d = new Date(r.created_at);
                      const dateStr = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
                      return `
                        <div class="review-comment-item">
                          <div class="review-comment-name">
                            🙋 ${esc(r.name)}
                          </div>
                          <div class="review-comment-text">${esc(r.review)}</div>
                          ${r.question
                            ? `<div class="review-comment-question">
                                 ${esc(r.question)}
                               </div>`
                            : ''}
                          <div class="review-comment-date">${dateStr}</div>
                        </div>`;
                    }).join('')
                }
              </div>
            </div>`;
        }).join('');
      } else {
        historyBlocks = `<div class="no-info-banner">
          <strong>📭 아직 등록된 지난 도서 기록이 없습니다</strong>
          관리자 페이지에서 지난 도서 기록을 추가해주세요.
          <br/><a href="admin.html" style="color:#8b6340;font-weight:600;">
          → 관리자 페이지 이동</a></div>`;
      }

      // ③ 이번 달 블록 맨 위에 + 지난 도서 아래에 표시
      container.innerHTML = currentBookBlock + historyBlocks;
    }

    // ============================================================
    // 🔴 Supabase Realtime 실시간 구독
    // 새 댓글 등록/삭제 시 탭1 + 탭3 자동 갱신
    // ============================================================
    function subscribeComments() {
      db.channel('comments-realtime')
        .on(
          'postgres_changes',
          { event: '*', schema: 'public', table: 'comments' },
          (payload) => {
            console.log('🔔 댓글 변경 감지:', payload.eventType);

            // 탭1 항상 갱신
            loadComments();

            // 탭3가 열려있으면 즉시 갱신
            if (document.getElementById('tab-reviews')
                .classList.contains('active')) {
              loadReviewsByBook();
            }

            // 모달이 열려있으면 모달 댓글도 갱신
            if (document.getElementById('bookModal')
                .classList.contains('open')) {
              const idx = window._currentModalIdx;
              if (idx !== undefined && window._bookHistoryData) {
                loadModalComments(window._bookHistoryData[idx]);
              }
            }
          }
        )
        .subscribe();
    }

    // ============================================================
    // 🗓️ meeting_date → "YYYY-MM" 변환
    // "2026년 7월 3일", "2026년 7월", "2026-07", "2026-07-03" 모두 처리
    // ============================================================
    function parseMeetingDate(dateStr) {
      if (!dateStr) return null;
      const korMatch = dateStr.match(/(\d{4})년\s*(\d{1,2})월/);
      if (korMatch) {
        return `${korMatch[1]}-${String(korMatch[2]).padStart(2,'0')}`;
      }
      const isoMatch = dateStr.match(/^(\d{4})-(\d{2})/);
      if (isoMatch) return `${isoMatch[1]}-${isoMatch[2]}`;
      return null;
    }

    // ============================================================
    // 정보 없을 때 배너
    // ============================================================
    function noInfoBanner(type) {
      return `<div class="no-info-banner">
        <strong>📭 아직 ${type} 정보가 등록되지 않았습니다</strong>
        관리자 페이지에서 이번 달 ${type} 정보를 입력해주세요.
        <br/><a href="admin.html" style="color:#8b6340;font-weight:600;">
        → 관리자 페이지 이동</a>
      </div>`;
    }

    // ============================================================
    // 🔧 유틸리티
    // ============================================================
    function esc(text) {
      if (!text) return '';
      return String(text)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function pad(n) { return String(n).padStart(2,'0'); }

    // ============================================================
    // 🚀 초기 실행
    // ============================================================
    loadSettings();
    loadComments();
    subscribeComments();   // 실시간 구독 시작
  </script>
</body>
</html>
