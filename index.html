<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 독서모임 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===== 기본 초기화 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #f5f0e8 0%, #e8ddd0 100%);
      min-height: 100vh;
      color: #3d2b1f;
    }

    /* ===== 헤더 ===== */
    header {
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      color: white;
      text-align: center;
      padding: 30px 20px 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      position: relative;
    }
    header h1 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 8px; }
    header p  { font-size: 0.95rem; opacity: 0.85; }

    .admin-link {
      position: absolute;
      top: 14px; right: 16px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 4px 10px;
      border-radius: 20px;
      transition: opacity 0.2s;
    }
    .admin-link:hover { color: rgba(255,255,255,0.9); }

    /* ===== 탭 네비게이션 ===== */
    .tab-nav {
      background: white;
      border-bottom: 2px solid #e8ddd0;
      display: flex;
      justify-content: center;
      gap: 4px;
      padding: 0 16px;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(92,61,46,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tab-btn {
      padding: 14px 22px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: #a0856e;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-bottom: -2px;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #5c3d2e; }
    .tab-btn.active {
      color: #5c3d2e;
      border-bottom-color: #8b6340;
    }

    /* ===== 탭 콘텐츠 ===== */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ===== 로딩 오버레이 ===== */
    #loading-overlay {
      position: fixed; inset: 0;
      background: rgba(245,240,232,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999;
      gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #e0cfc0;
      border-top-color: #8b6340;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p { color: #8b6340; font-size: 0.95rem; }

    /* ===== 컨테이너 ===== */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 16px;
      display: grid;
      gap: 24px;
    }

    /* ===== 카드 공통 ===== */
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 4px 20px rgba(92,61,46,0.1);
    }
    .card h2 {
      font-size: 1.2rem;
      color: #5c3d2e;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8ddd0;
      display: flex; align-items: center; gap: 8px;
    }

    /* ===== 모임 일정 ===== */
    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }
    .schedule-item {
      background: linear-gradient(135deg, #fdf6ee, #f5ece0);
      border: 1px solid #e0cfc0;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .schedule-item .label {
      font-size: 0.75rem; color: #8b6340;
      font-weight: 600; letter-spacing: 1px; margin-bottom: 6px;
    }
    .schedule-item .value { font-size: 1rem; font-weight: 700; color: #3d2b1f; }

    /* ===== 선정도서 ===== */
    .book-section { display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap; }
    .book-cover-wrap { flex-shrink: 0; }
    .book-cover {
      width: 140px; height: 200px;
      border-radius: 6px; object-fit: cover;
      box-shadow: 6px 6px 20px rgba(0,0,0,0.25), -2px 0 8px rgba(0,0,0,0.1);
      display: block;
    }
    .book-cover-placeholder {
      width: 140px; height: 200px;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 6px 6px 20px rgba(0,0,0,0.25);
      color: white; font-size: 2.5rem;
    }
    .book-info { flex: 1; min-width: 200px; }
    .book-title { font-size: 1.5rem; font-weight: 700; color: #3d2b1f; margin-bottom: 6px; line-height: 1.3; }
    .book-author { font-size: 0.95rem; color: #8b6340; margin-bottom: 4px; }
    .book-publisher { font-size: 0.85rem; color: #a0856e; margin-bottom: 14px; }
    .book-desc {
      font-size: 0.9rem; line-height: 1.7; color: #5a4035;
      background: #fdf6ee;
      border-left: 3px solid #8b6340;
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
    }

    /* ===== 정보 없을 때 배너 ===== */
    .no-info-banner {
      background: #fff8f0;
      border: 2px dashed #c4a882;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      color: #8b6340;
      font-size: 0.9rem;
      line-height: 1.8;
    }
    .no-info-banner strong { display: block; font-size: 1.1rem; margin-bottom: 8px; }

    /* ===== 댓글 작성 폼 ===== */
    .form-section {
      background: linear-gradient(135deg, #fffbf7, #fdf6ee);
      border: 1px solid #e8ddd0;
    }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 0.85rem;
      font-weight: 600; color: #5c3d2e; margin-bottom: 6px;
    }
    .form-row input,
    .form-row textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid #d4c4b0; border-radius: 8px;
      font-size: 0.95rem; font-family: inherit; color: #3d2b1f;
      background: white; resize: vertical; transition: border-color 0.2s;
    }
    .form-row input:focus,
    .form-row textarea:focus {
      outline: none; border-color: #8b6340;
      box-shadow: 0 0 0 3px rgba(139,99,64,0.1);
    }
    .submit-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      color: white; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s; font-family: inherit;
    }
    .submit-btn:hover { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #msg { text-align: center; margin-top: 10px; font-size: 0.9rem; min-height: 20px; color: #5c3d2e; }

    /* ===== 이번 달 댓글 목록 ===== */
    .comments-list { display: flex; flex-direction: column; gap: 14px; }
    .comment-card {
      background: #fdf6ee; border: 1px solid #e8ddd0;
      border-radius: 12px; padding: 16px 18px;
    }
    .comment-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .comment-name { font-weight: 700; color: #5c3d2e; font-size: 0.95rem; }
    .comment-date { font-size: 0.75rem; color: #b0927a; }
    .comment-review {
      font-size: 0.92rem; color: #3d2b1f; line-height: 1.6;
      margin-bottom: 8px; padding: 8px 12px;
      background: white; border-radius: 8px; border-left: 3px solid #c4a882;
    }
    .comment-question { font-size: 0.88rem; color: #6b4c35; line-height: 1.6; }
    .comment-question::before { content: "💬 질문: "; font-weight: 600; }
    .empty-msg {
      text-align: center; color: #b0927a;
      font-size: 0.9rem; padding: 30px 0;
    }

    /* ===== 업데이트 배지 ===== */
    .updated-badge {
      font-size: 0.72rem; color: #b0927a;
      margin-left: auto; font-weight: normal;
    }

    /* ===== 📚 지난 독서목록 ===== */
    .history-list { display: flex; flex-direction: column; gap: 20px; }
    .history-item {
      display: flex; gap: 20px;
      padding: 20px;
      background: #fdf6ee;
      border: 1px solid #e8ddd0;
      border-radius: 14px;
      align-items: flex-start;
      transition: box-shadow 0.2s;
    }
    .history-item:hover {
      box-shadow: 0 4px 16px rgba(92,61,46,0.12);
    }
    .history-cover {
      width: 80px; height: 114px;
      border-radius: 5px; object-fit: cover;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    .history-cover-placeholder {
      width: 80px; height: 114px;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      border-radius: 5px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.8rem;
      box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
    }
    .history-info { flex: 1; min-width: 0; }
    .history-title {
      font-size: 1.1rem; font-weight: 700; color: #3d2b1f;
      margin-bottom: 4px; line-height: 1.3;
    }
    .history-author { font-size: 0.88rem; color: #8b6340; margin-bottom: 2px; }
    .history-publisher { font-size: 0.82rem; color: #a0856e; margin-bottom: 8px; }
    .history-date {
      display: inline-block;
      background: #e8ddd0; color: #5c3d2e;
      font-size: 0.75rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
    }
    .history-desc {
      font-size: 0.85rem; color: #6b4c35; line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ===== 💬 지난 한줄평 (책별 묶음) ===== */
    .review-book-block {
      background: white;
      border-radius: 14px;
      border: 1px solid #e8ddd0;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 2px 10px rgba(92,61,46,0.07);
    }
    .review-book-header {
      display: flex; gap: 14px; align-items: center;
      background: linear-gradient(135deg, #fdf6ee, #f5ece0);
      padding: 16px 20px;
      border-bottom: 1px solid #e8ddd0;
    }
    .review-book-thumb {
      width: 48px; height: 68px;
      border-radius: 4px; object-fit: cover;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2); flex-shrink: 0;
    }
    .review-book-thumb-placeholder {
      width: 48px; height: 68px;
      background: linear-gradient(135deg, #5c3d2e, #8b6340);
      border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.2rem;
    }
    .review-book-meta { flex: 1; }
    .review-book-title {
      font-size: 1rem; font-weight: 700; color: #3d2b1f; margin-bottom: 3px;
    }
    .review-book-author { font-size: 0.82rem; color: #8b6340; }
    .review-book-date {
      font-size: 0.72rem; background: #5c3d2e; color: white;
      padding: 3px 10px; border-radius: 20px; white-space: nowrap;
      align-self: flex-start;
    }
    .review-comments-wrap { padding: 16px 20px; }
    .review-comment-item {
      padding: 12px 14px;
      background: #fdf6ee;
      border-radius: 10px;
      margin-bottom: 10px;
      border-left: 3px solid #c4a882;
    }
    .review-comment-item:last-child { margin-bottom: 0; }
    .review-comment-name {
      font-size: 0.85rem; font-weight: 700; color: #5c3d2e; margin-bottom: 5px;
    }
    .review-comment-text {
      font-size: 0.88rem; color: #3d2b1f; line-height: 1.6; margin-bottom: 4px;
    }
    .review-comment-question {
      font-size: 0.83rem; color: #6b4c35; line-height: 1.5;
    }
    .review-comment-question::before { content: "💬 질문: "; font-weight: 600; }
    .review-comment-date { font-size: 0.7rem; color: #b0927a; margin-top: 4px; }
    .review-empty {
      text-align: center; color: #b0927a;
      font-size: 0.85rem; padding: 16px 0;
    }
    .review-count-badge {
      font-size: 0.72rem;
      background: rgba(92,61,46,0.12);
      color: #5c3d2e; padding: 2px 8px;
      border-radius: 99px; margin-left: 6px; font-weight: 600;
    }

    /* ===== 로딩 인디케이터 (탭 전환시) ===== */
    .tab-loading {
      text-align: center; padding: 40px;
      color: #a0856e; font-size: 0.9rem;
    }
    .tab-spinner {
      width: 28px; height: 28px;
      border: 3px solid #e0cfc0;
      border-top-color: #8b6340;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    /* ===== 반응형 ===== */
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .book-section { flex-direction: column; align-items: center; }
      .book-info { text-align: center; }
      .book-desc { text-align: left; }
      .tab-btn { padding: 12px 14px; font-size: 0.82rem; }
      .history-item { gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- 로딩 오버레이 -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>모임 정보를 불러오는 중...</p>
  </div>

  <!-- 헤더 -->
  <header>
    <h1>📚 우리들의 독서모임</h1>
    <p>책과 함께하는 즐거운 시간</p>
    <a href="admin.html" class="admin-link">⚙️ 관리자</a>
  </header>

  <!-- ===== 탭 네비게이션 ===== -->
  <nav class="tab-nav">
    <button class="tab-btn active"
      onclick="switchTab('current', this)">📌 이번 달 모임</button>
    <button class="tab-btn"
      onclick="switchTab('history', this)">📚 지난 독서목록</button>
    <button class="tab-btn"
      onclick="switchTab('reviews', this)">💬 지난 한줄평/질문</button>
  </nav>

  <!-- ============================================================ -->
  <!-- 📌 TAB 1 : 이번 달 모임 (기존 코드 그대로)                   -->
  <!-- ============================================================ -->
  <div id="tab-current" class="tab-content active">
    <div class="container">

      <!-- 모임 일정 -->
      <div class="card">
        <h2>
          📅 이번 달 모임 일정
          <span class="updated-badge" id="updatedBadge"></span>
        </h2>
        <div id="scheduleArea"></div>
      </div>

      <!-- 선정도서 -->
      <div class="card">
        <h2>📖 이번 달 선정도서</h2>
        <div id="bookArea"></div>
      </div>

      <!-- 한줄평 작성 폼 -->
      <div class="card form-section">
        <h2>✏️ 나의 한줄평 &amp; 질문 남기기</h2>
        <form id="commentForm">
          <div class="form-row">
            <label for="name">이름 (닉네임)</label>
            <input type="text" id="name"
              placeholder="예: 책벌레독자" maxlength="20" required/>
          </div>
          <div class="form-row">
            <label for="review">📝 한줄평</label>
            <textarea id="review" rows="2"
              placeholder="책을 읽은 소감을 한 줄로 남겨주세요"
              maxlength="200" required></textarea>
          </div>
          <div class="form-row">
            <label for="question">💬 모임에서 나누고 싶은 질문 (선택)</label>
            <textarea id="question" rows="2"
              placeholder="함께 이야기하고 싶은 질문을 남겨주세요 (선택사항)"
              maxlength="300"></textarea>
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">
            💌 제출하기
          </button>
        </form>
        <div id="msg"></div>
      </div>

      <!-- 이번 달 댓글 목록 -->
      <div class="card">
        <h2>💬 모임원들의 한줄평</h2>
        <div class="comments-list" id="commentsList">
          <div class="empty-msg">아직 등록된 한줄평이 없습니다 🌱</div>
        </div>
      </div>

    </div>
  </div><!-- /tab-current -->

  <!-- ============================================================ -->
  <!-- 📚 TAB 2 : 지난 독서목록                                      -->
  <!-- ============================================================ -->
  <div id="tab-history" class="tab-content">
    <div class="container">
      <div class="card">
        <h2>
          📚 역대 선정도서
          <span class="updated-badge" id="historyCountBadge"></span>
        </h2>
        <div id="bookHistoryList">
          <div class="tab-loading">
            <div class="tab-spinner"></div>불러오는 중...
          </div>
        </div>
      </div>
    </div>
  </div><!-- /tab-history -->

  <!-- ============================================================ -->
  <!-- 💬 TAB 3 : 지난 한줄평/질문 (책별 묶음)                       -->
  <!-- ============================================================ -->
  <div id="tab-reviews" class="tab-content">
    <div class="container">
      <div class="card">
        <h2>💬 지난 한줄평 &amp; 질문 모아보기</h2>
        <p style="font-size:0.82rem;color:#a0856e;margin-bottom:18px;">
          📖 모임에서 읽은 책별로 남겨진 한줄평과 질문을 모아볼 수 있습니다.
        </p>
        <div id="reviewsByBook">
          <div class="tab-loading">
            <div class="tab-spinner"></div>불러오는 중...
          </div>
        </div>
      </div>
    </div>
  </div><!-- /tab-reviews -->


  <script>
    // ============================================================
    // ⚙️ Supabase 연결 설정
    // ============================================================
    const SUPABASE_URL = 'https://pxbgwwavxggbtywqxogj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4Ymd3d2F2eGdnYnR5d3F4b2dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjk5OTEsImV4cCI6MjA5NzYwNTk5MX0.XM0039icXsyrAQ_VLl7TvB6J_MzUzP9jQotifG5C5OM';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // 탭별 로드 여부 추적 (중복 로딩 방지)
    const tabLoaded = { current: true, history: false, reviews: false };

    // ============================================================
    // 🗂️ 탭 전환
    // ============================================================
    function switchTab(tabName, el) {
      // 버튼 활성화
      document.querySelectorAll('.tab-btn')
        .forEach(b => b.classList.remove('active'));
      el.classList.add('active');

      // 콘텐츠 전환
      document.querySelectorAll('.tab-content')
        .forEach(c => c.classList.remove('active'));
      document.getElementById(`tab-${tabName}`).classList.add('active');

      // 탭별 데이터 최초 1회만 로드
      if (!tabLoaded[tabName]) {
        tabLoaded[tabName] = true;
        if (tabName === 'history')  loadBookHistory();
        if (tabName === 'reviews')  loadReviewsByBook();
      }
    }

    // ============================================================
    // 📋 이번 달 설정 불러오기
    // ============================================================
    async function loadSettings() {
      const { data, error } = await db
        .from('settings').select('*').eq('id', 1).single();

      // 로딩 오버레이 숨기기
      document.getElementById('loading-overlay').style.display = 'none';

      if (error || !data) {
        document.getElementById('scheduleArea').innerHTML = noInfoBanner('일정');
        document.getElementById('bookArea').innerHTML    = noInfoBanner('도서');
        return;
      }

      // 모임 일정
      const scheduleHtml = (data.schedule_date||data.schedule_time||data.schedule_place||data.schedule_members)
        ? `<div class="schedule-grid">
            <div class="schedule-item">
              <div class="label">📆 모임 날짜</div>
              <div class="value">${esc(data.schedule_date)||'미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">🕑 시간</div>
              <div class="value">${esc(data.schedule_time)||'미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">📍 장소</div>
              <div class="value">${esc(data.schedule_place)||'미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">👥 참석인원</div>
              <div class="value">${esc(data.schedule_members)||'미정'}</div>
            </div>
           </div>`
        : noInfoBanner('일정');

      document.getElementById('scheduleArea').innerHTML = scheduleHtml;

      if (data.updated_at) {
        const d = new Date(data.updated_at);
        document.getElementById('updatedBadge').textContent =
          `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} 업데이트`;
      }

      // 선정도서
      const bookHtml = data.book_title
        ? `<div class="book-section">
            <div class="book-cover-wrap">
              ${data.book_cover_url
                ? `<img class="book-cover" src="${esc(data.book_cover_url)}"
                    alt="선정도서 표지"
                    onerror="this.style.display='none';
                    document.getElementById('coverFallback').style.display='flex';"/>`
                : ''}
              <div id="coverFallback" class="book-cover-placeholder"
                style="display:${data.book_cover_url?'none':'flex'}">📚</div>
            </div>
            <div class="book-info">
              <div class="book-title">${esc(data.book_title)}</div>
              <div class="book-author">✍️ ${esc(data.book_author)||'저자 미등록'}</div>
              <div class="book-publisher">🏢 ${esc(data.book_publisher)||'출판사 미등록'}</div>
              <div class="book-desc">${esc(data.book_desc)||'도서 설명이 없습니다.'}</div>
            </div>
           </div>`
        : noInfoBanner('도서');

      document.getElementById('bookArea').innerHTML = bookHtml;
    }

    // ============================================================
    // 💬 이번 달 댓글 불러오기
    // ============================================================
    async function loadComments() {
      const list = document.getElementById('commentsList');
      const { data, error } = await db
        .from('comments').select('*')
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = '<div class="empty-msg">댓글을 불러오지 못했습니다 😥</div>';
        return;
      }
      if (!data || data.length === 0) {
        list.innerHTML = '<div class="empty-msg">아직 등록된 한줄평이 없습니다 🌱</div>';
        return;
      }
      list.innerHTML = data.map(item => {
        const d    = new Date(item.created_at);
        const date = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        return `
          <div class="comment-card">
            <div class="comment-header">
              <span class="comment-name">🙋 ${esc(item.name)}</span>
              <span class="comment-date">${date}</span>
            </div>
            <div class="comment-review">${esc(item.review)}</div>
            ${item.question
              ? `<div class="comment-question">${esc(item.question)}</div>` : ''}
          </div>`;
      }).join('');
    }

    // ============================================================
    // 📝 댓글 제출
    // ============================================================
    document.getElementById('commentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const review   = document.getElementById('review').value.trim();
      const question = document.getElementById('question').value.trim();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');

      if (!name || !review) {
        msg.style.color = '#c0392b';
        msg.textContent = '이름과 한줄평은 필수 입력입니다!';
        return;
      }
      btn.disabled = true; btn.textContent = '제출 중...';

      const { error } = await db.from('comments').insert([{ name, review, question }]);

      if (error) {
        msg.style.color = '#c0392b';
        msg.textContent = '제출 중 오류가 발생했습니다 😥';
      } else {
        msg.style.color = '#27ae60';
        msg.textContent = '✅ 한줄평이 등록되었습니다! 감사합니다 😊';
        document.getElementById('commentForm').reset();
        await loadComments();
        setTimeout(() => { msg.textContent = ''; }, 3000);
      }
      btn.disabled = false; btn.textContent = '💌 제출하기';
    });

    // ============================================================
    // 📚 지난 독서목록 불러오기 (book_history)
    // ============================================================
    async function loadBookHistory() {
      const el = document.getElementById('bookHistoryList');

      const { data, error } = await db
        .from('book_history').select('*')
        .order('created_at', { ascending: false });

      if (error || !data || data.length === 0) {
        el.innerHTML = `<div class="no-info-banner">
          <strong>📭 아직 등록된 독서 기록이 없습니다</strong>
          관리자 페이지에서 지난 도서 기록을 추가해주세요.
          <br/><a href="admin.html" style="color:#8b6340;font-weight:600;">
          → 관리자 페이지 이동</a></div>`;
        return;
      }

      document.getElementById('historyCountBadge').textContent = `총 ${data.length}권`;

      el.innerHTML = `<div class="history-list">` +
        data.map(b => `
          <div class="history-item">
            ${b.book_cover_url
              ? `<img class="history-cover"
                   src="${esc(b.book_cover_url)}"
                   alt="${esc(b.book_title)}"
                   onerror="this.style.display='none'">`
              : `<div class="history-cover-placeholder">📚</div>`}
            <div class="history-info">
              <div class="history-title">${esc(b.book_title)}</div>
              <div class="history-author">✍️ ${esc(b.book_author)||'저자 미등록'}</div>
              <div class="history-publisher">
                🏢 ${esc(b.book_publisher)||'출판사 미등록'}
              </div>
              ${b.meeting_date
                ? `<span class="history-date">📅 ${esc(b.meeting_date)}</span>`
                : ''}
              ${b.book_desc
                ? `<div class="history-desc">${esc(b.book_desc)}</div>`
                : ''}
            </div>
          </div>`).join('') +
        `</div>`;
    }

    // ============================================================
    // 💬 책별 한줄평/질문 불러오기
    // meeting_date 기준으로 연도-월 매칭
    // ============================================================
    async function loadReviewsByBook() {
      const container = document.getElementById('reviewsByBook');

      // 1) 도서 히스토리 가져오기
      const { data: books, error: bErr } = await db
        .from('book_history').select('*')
        .order('created_at', { ascending: false });

      if (bErr || !books || books.length === 0) {
        container.innerHTML = `<div class="no-info-banner">
          <strong>📭 아직 등록된 도서 기록이 없습니다</strong>
          관리자 페이지에서 지난 도서 기록을 추가해주세요.
          <br/><a href="admin.html" style="color:#8b6340;font-weight:600;">
          → 관리자 페이지 이동</a></div>`;
        return;
      }

      // 2) 전체 댓글 가져오기
      const { data: allComments } = await db
        .from('comments').select('*')
        .order('created_at', { ascending: true });

      const comments = allComments || [];

      // 3) 책별로 매칭하여 렌더링
      container.innerHTML = books.map(book => {

        // meeting_date 파싱 → "YYYY-MM" 형태로 변환하여 매칭
        // 예: "2026년 7월 3일" → "2026-07"
        const ym = parseMeetingDate(book.meeting_date);

        // 해당 월에 작성된 댓글 필터링
        const matched = ym
          ? comments.filter(c => c.created_at && c.created_at.startsWith(ym))
          : [];

        return `
          <div class="review-book-block">
            <!-- 책 헤더 -->
            <div class="review-book-header">
              ${book.book_cover_url
                ? `<img class="review-book-thumb"
                     src="${esc(book.book_cover_url)}"
                     alt="${esc(book.book_title)}"
                     onerror="this.style.display='none'">`
                : `<div class="review-book-thumb-placeholder">📚</div>`}
              <div class="review-book-meta">
                <div class="review-book-title">${esc(book.book_title)}</div>
                <div class="review-book-author">
                  ${esc(book.book_author)||''}
                  ${book.book_publisher ? ` · ${esc(book.book_publisher)}` : ''}
                </div>
              </div>
              ${book.meeting_date
                ? `<div class="review-book-date">📅 ${esc(book.meeting_date)}</div>`
                : ''}
            </div>

            <!-- 해당 달 댓글 목록 -->
            <div class="review-comments-wrap">
              ${matched.length === 0
                ? `<div class="review-empty">
                     이 책에 대한 한줄평이 아직 없습니다 🌱
                   </div>`
                : `<div style="font-size:0.78rem;color:#a0856e;margin-bottom:10px;">
                     총 ${matched.length}개의 한줄평
                     <span class="review-count-badge">${matched.length}</span>
                   </div>` +
                  matched.map(r => {
                    const d = new Date(r.created_at);
                    const dateStr = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;
                    return `
                      <div class="review-comment-item">
                        <div class="review-comment-name">🙋 ${esc(r.name)}</div>
                        <div class="review-comment-text">${esc(r.review)}</div>
                        ${r.question
                          ? `<div class="review-comment-question">${esc(r.question)}</div>`
                          : ''}
                        <div class="review-comment-date">${dateStr}</div>
                      </div>`;
                  }).join('')
              }
            </div>
          </div>`;
      }).join('');
    }

    // ============================================================
    // 🗓️ meeting_date → "YYYY-MM" 변환 함수
    // "2026년 7월 3일", "2026년 7월", "2026-07", "2026-07-03" 모두 처리
    // ============================================================
    function parseMeetingDate(dateStr) {
      if (!dateStr) return null;

      // "2026년 7월" 또는 "2026년 7월 3일" 형태
      const korMatch = dateStr.match(/(\d{4})년\s*(\d{1,2})월/);
      if (korMatch) {
        const y = korMatch[1];
        const m = String(korMatch[2]).padStart(2, '0');
        return `${y}-${m}`;
      }

      // "2026-07" 또는 "2026-07-03" 형태
      const isoMatch = dateStr.match(/^(\d{4})-(\d{2})/);
      if (isoMatch) {
        return `${isoMatch[1]}-${isoMatch[2]}`;
      }

      return null;
    }

    // ============================================================
    // 정보 없을 때 배너
    // ============================================================
    function noInfoBanner(type) {
      return `<div class="no-info-banner">
        <strong>📭 아직 ${type} 정보가 등록되지 않았습니다</strong>
        관리자 페이지에서 이번 달 ${type} 정보를 입력해주세요.
        <br/><a href="admin.html" style="color:#8b6340;font-weight:600;">
        → 관리자 페이지 이동</a>
      </div>`;
    }

    // ============================================================
    // 🔧 유틸리티
    // ============================================================
    function esc(text) {
      if (!text) return '';
      return String(text)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function pad(n) { return String(n).padStart(2,'0'); }

    // ============================================================
    // 🚀 초기 실행
    // ============================================================
    loadSettings();
    loadComments();
  </script>
</body>
</html>
