  /* ----------------------------------------------------------
      📌 탭 열기 함수
  ---------------------------------------------------------- */
  function openTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.tab-btn[onclick="openTab('${tabName}')"]`).classList.add('active');

    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
  }



  /* ----------------------------------------------------------
      📅 이번 달 설정 불러오기 (settings)
  ---------------------------------------------------------- */
  async function loadCurrentSettings() {
    const { data } = await db.from("settings").select("*").eq("id", 1).single();

    const scheduleEl = document.getElementById("currentSchedule");
    const bookEl = document.getElementById("currentBook");

    if (!data) {
      scheduleEl.innerHTML = "등록된 일정 없음";
      bookEl.innerHTML = "등록된 도서 없음";
      return;
    }

    scheduleEl.innerHTML = `
      <div>📆 날짜: ${data.schedule_date || "-"}</div>
      <div>🕑 시간: ${data.schedule_time || "-"}</div>
      <div>📍 장소: ${data.schedule_place || "-"}</div>
      <div>👥 예상 참석: ${data.schedule_members || "-"}</div>
    `;

    bookEl.innerHTML = `
      <div style="display:flex; gap:16px; align-items:flex-start;">
        <img class="book-cover" src="${data.book_cover_url}" onerror="this.src=''; this.style.background='#ddd';"/>
        <div>
          <div class="book-info-title">${data.book_title}</div>
          <div>${data.book_author} / ${data.book_publisher}</div>
          <div style="margin-top:6px; line-height:1.5;">${data.book_desc}</div>
        </div>
      </div>
    `;
  }



  /* ----------------------------------------------------------
      📚 지난 독서 목록 불러오기 (book_history)
  ---------------------------------------------------------- */
  async function loadBookHistory() {
    const listEl = document.getElementById("bookHistoryList");
    const { data } = await db
      .from("book_history")
      .select("*")
      .order("created_at", { ascending: false });

    if (!data || data.length === 0) {
      listEl.innerHTML = "아직 기록이 없습니다.";
      return;
    }

    listEl.innerHTML = data.map(b => `
      <div class="book-item">
        <img class="book-cover" src="${b.book_cover_url}" onerror="this.src=''; this.style.background='#ccc'"/>
        <div>
          <div class="book-info-title">${b.book_title}</div>
          <div>${b.book_author} / ${b.book_publisher}</div>
          <div>📅 모임 날짜: ${b.meeting_date}</div>
        </div>
      </div>
    `).join("");
  }



  /* ----------------------------------------------------------
      💬 책별 한줄평/질문 묶어서 보기
      comments + book_history 매칭
  ---------------------------------------------------------- */
  async function loadReviewsByBook() {
    const container = document.getElementById("reviewsByBook");

    const { data: books } = await db
      .from("book_history")
      .select("*")
      .order("meeting_date", { ascending: false });

    if (!books || books.length === 0) {
      container.innerHTML = "기록된 책이 없습니다.";
      return;
    }

    const { data: comments } = await db
      .from("comments")
      .select("*")
      .order("created_at", { ascending: true });

    container.innerHTML = books.map(book => {
      const month = book.meeting_date;   // "2026년 7월 3일" ← 그대로 사용

      // 🔍 meeting_date 포함된 댓글만 매칭
      const match = comments.filter(c =>
        c.created_at && c.created_at.includes(month.slice(0, 7).replace("년 ", "-").replace("월", ""))
      );

      return `
        <div style="margin-bottom:30px;">
          <h3 style="border-bottom:2px solid #d8c7b8; padding-bottom:6px;">
            📘 ${book.book_title} (${book.meeting_date})
          </h3>

          ${match.length === 0
            ? "<div>이 책에 대한 기록이 없습니다.</div>"
            : match.map(r => `
              <div class="review-box">
                <div class="review-name">🙋 ${r.name}</div>
                <div>📝 ${r.review}</div>
                ${r.question ? `<div>💬 질문: ${r.question}</div>` : ""}
              </div>
            `).join("")
          }
        </div>
      `;
    }).join("");
  }



  /* ----------------------------------------------------------
      🚀 초기 실행
  ---------------------------------------------------------- */
  loadCurrentSettings();
  loadBookHistory();
  loadReviewsByBook();

</script>

        return;
      }

      // ── 모임 일정 렌더링 ──
      const scheduleHtml = (data.schedule_date || data.schedule_time || data.schedule_place || data.schedule_members)
        ? `<div class="schedule-grid">
            <div class="schedule-item">
              <div class="label">📆 모임 날짜</div>
              <div class="value">${esc(data.schedule_date) || '미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">🕑 시간</div>
              <div class="value">${esc(data.schedule_time) || '미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">📍 장소</div>
              <div class="value">${esc(data.schedule_place) || '미정'}</div>
            </div>
            <div class="schedule-item">
              <div class="label">👥 참석인원</div>
              <div class="value">${esc(data.schedule_members) || '미정'}</div>
            </div>
           </div>`
        : noInfoBanner('일정');

      document.getElementById('scheduleArea').innerHTML = scheduleHtml;

      // 업데이트 시각 표시
      if (data.updated_at) {
        const d = new Date(data.updated_at);
        const formatted = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} 업데이트`;
        document.getElementById('updatedBadge').textContent = formatted;
      }

      // ── 선정도서 렌더링 ──
      const bookHtml = (data.book_title)
        ? `<div class="book-section">
            <div class="book-cover-wrap">
              ${data.book_cover_url
                ? `<img class="book-cover"
                        src="${esc(data.book_cover_url)}"
                        alt="선정도서 표지"
                        onerror="this.style.display='none';
                        document.getElementById('coverFallback').style.display='flex';" />`
                : ''}
              <div id="coverFallback" class="book-cover-placeholder"
                   style="display:${data.book_cover_url ? 'none' : 'flex'}">📚</div>
            </div>
            <div class="book-info">
              <div class="book-title">${esc(data.book_title)}</div>
              <div class="book-author">✍️ ${esc(data.book_author) || '저자 미등록'}</div>
              <div class="book-publisher">🏢 ${esc(data.book_publisher) || '출판사 미등록'}</div>
              <div class="book-desc">${esc(data.book_desc) || '도서 설명이 없습니다.'}</div>
            </div>
           </div>`
        : noInfoBanner('도서');

      document.getElementById('bookArea').innerHTML = bookHtml;
    }

    // 정보 없을 때 배너
    function noInfoBanner(type) {
      return `<div class="no-info-banner">
        <strong>📭 아직 ${type} 정보가 등록되지 않았습니다</strong>
        관리자 페이지에서 이번 달 ${type} 정보를 입력해주세요.
        <br/><a href="admin.html" style="color:#8b6340;font-weight:600;">→ 관리자 페이지 이동</a>
      </div>`;
    }

    // ============================================================
    // 💬 댓글 목록 불러오기
    // ============================================================
    async function loadComments() {
      const list = document.getElementById('commentsList');
      const { data, error } = await db
        .from('comments')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        list.innerHTML = '<div class="empty-msg">댓글을 불러오지 못했습니다 😥</div>';
        return;
      }
      if (!data || data.length === 0) {
        list.innerHTML = '<div class="empty-msg">아직 등록된 한줄평이 없습니다 🌱</div>';
        return;
      }
      list.innerHTML = data.map(item => {
        const d = new Date(item.created_at);
        const date = `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        return `
          <div class="comment-card">
            <div class="comment-header">
              <span class="comment-name">🙋 ${esc(item.name)}</span>
              <span class="comment-date">${date}</span>
            </div>
            <div class="comment-review">${esc(item.review)}</div>
            ${item.question ? `<div class="comment-question">${esc(item.question)}</div>` : ''}
          </div>`;
      }).join('');
    }

    // ============================================================
    // 📝 댓글 제출
    // ============================================================
    document.getElementById('commentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('name').value.trim();
      const review   = document.getElementById('review').value.trim();
      const question = document.getElementById('question').value.trim();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');

      if (!name || !review) {
        msg.style.color = '#c0392b';
        msg.textContent = '이름과 한줄평은 필수 입력입니다!';
        return;
      }
      btn.disabled = true; btn.textContent = '제출 중...';

      const { error } = await db.from('comments').insert([{ name, review, question }]);

      if (error) {
        msg.style.color = '#c0392b';
        msg.textContent = '제출 중 오류가 발생했습니다 😥';
      } else {
        msg.style.color = '#27ae60';
        msg.textContent = '✅ 한줄평이 등록되었습니다! 감사합니다 😊';
        document.getElementById('commentForm').reset();
        await loadComments();
        setTimeout(() => { msg.textContent = ''; }, 3000);
      }
      btn.disabled = false; btn.textContent = '💌 제출하기';
    });

    // ============================================================
    // 🔧 유틸리티
    // ============================================================
    function esc(text) {
      if (!text) return '';
      return String(text)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function pad(n) { return String(n).padStart(2,'0'); }

    // ============================================================
    // 🚀 초기 실행
    // ============================================================
    loadSettings();
    loadComments();
  </script>
</body>
</html>
